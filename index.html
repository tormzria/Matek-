<!DOCTYPE html>
<html lang="hu">
<head>
 <title>Lusta Mágus Matekgyakorló</title>
 <meta name="description"     content="Ingyenes, nyilvános matek gyakorló gyerekeknek alapműveletekkel, relációs feladatokkal és kitölthető gyakorlósorral.">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matek gyakorló 3.3</title>
  <style>
    body {
      margin: 0;
      padding: 14px;
      font-family: Arial, sans-serif;
      background: linear-gradient(#f7f4ff, #eef6ff);
      color: #1f2430;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      position: relative;
    }

    .card {
      background: white;
      border-radius: 22px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.12);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 30px;
    }

    .sub {
      text-align: center;
      color: #667085;
      margin-bottom: 10px;
    }

    .debug {
      display: none;
      white-space: pre-wrap;
      color: #a40000;
      background: #fff1f1;
      border: 2px solid #efb5b5;
      border-radius: 16px;
      padding: 12px;
      font-weight: bold;
    }

    .magusBox {
      text-align: center;
      margin-bottom: 14px;
    }

    .magusAvatar {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 28px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.16);
      background: #eef2ff;
    }

    .magusName {
      margin-top: 8px;
      font-weight: bold;
      color: #6f5cff;
      font-size: 20px;
    }

    .magusSpeech {
      margin: 10px auto 0;
      max-width: 420px;
      background: #f3f6ff;
      border: 2px solid #d9e2ff;
      border-radius: 18px;
      padding: 10px 14px;
      font-size: 16px;
      font-weight: bold;
      color: #42506d;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .stat {
      background: #f6f8ff;
      border-radius: 16px;
      text-align: center;
      padding: 12px 8px;
    }

    .statValue {
      font-size: 22px;
      font-weight: bold;
    }

    .statLabel {
      font-size: 12px;
      color: #667085;
      margin-top: 4px;
    }

    .settings {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      display: block;
      font-size: 14px;
      color: #667085;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input[type="number"] {
      width: 100%;
      min-height: 52px;
      border: 2px solid #d9def0;
      border-radius: 14px;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      box-sizing: border-box;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .pill {
      border: none;
      border-radius: 999px;
      padding: 12px 14px;
      background: #eef2ff;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    .pill.active {
      background: #6f5cff;
      color: white;
    }

    .taskType {
      cursor: pointer;
    }

    .taskTag {
      display: inline-block;
      background: #eef2ff;
      color: #40506f;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .taskBox {
      text-align: center;
    }

    .taskArea {
      min-height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex-direction: column;
    }

    .expr {
      font-size: 52px;
      font-weight: bold;
      line-height: 1.2;
    }

    .blank {
      display: inline-block;
      min-width: 110px;
      min-height: 70px;
      line-height: 70px;
      border-radius: 16px;
      border: 4px dashed #bcc7e8;
      background: #fbfcff;
      vertical-align: middle;
      margin: 0 4px;
      padding: 0 10px;
      box-sizing: border-box;
    }

    .filled {
      border-style: solid;
      border-color: #cad4f0;
    }

    .good {
      border-color: #18b368 !important;
      background: #edfff5 !important;
      color: #0f8b50 !important;
    }

    .bad {
      border-color: #e34d4d !important;
      background: #fff0f0 !important;
      color: #c63939 !important;
    }

    .relationDiff {
      margin-top: 10px;
      font-size: 24px;
      font-weight: bold;
      color: #275b98;
      background: #eef6ff;
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
    }

    .message {
      min-height: 34px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      margin-top: 8px;
    }

    .messageGood { color: #18b368; }
    .messageBad { color: #e34d4d; }
    .messageInfo { color: #3f7cff; }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .bigBtn {
      min-height: 60px;
      border: none;
      border-radius: 16px;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
    }

    .primaryBtn {
      background: #6f5cff;
      color: white;
    }

    .yellowBtn {
      background: #ffd84d;
      color: #2f2a14;
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .key {
      min-height: 74px;
      border: none;
      border-radius: 16px;
      font-size: 30px;
      font-weight: bold;
      background: #f5f7ff;
      box-shadow: inset 0 0 0 2px #dde4ff;
      cursor: pointer;
    }

    .keyAction {
      background: #eaf6ff;
      color: #245f9d;
      font-size: 22px;
    }

    .keyNeg {
      background: #fff7ea;
      color: #7b5d17;
    }

    .wide {
      grid-column: span 2;
    }

    .hint {
      margin-top: 8px;
      text-align: center;
      color: #667085;
      font-size: 14px;
    }

    .reward {
      display: none;
      text-align: center;
      background: linear-gradient(#fffbe8, #fff4c9);
      border-radius: 20px;
      padding: 16px;
    }

    .rewardTitle {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .rewardText {
      font-size: 17px;
      margin-bottom: 12px;
      color: #5c4a14;
    }

    .sheetCard {
      display: none;
    }

    .sheetTitle {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .sheetTaskList {
      display: grid;
      gap: 10px;
    }

    .sheetRow {
      display: grid;
      grid-template-columns: auto 110px;
      gap: 10px;
      align-items: center;
      background: #f8faff;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 24px;
      font-weight: bold;
    }

    .sheetAnswer {
      width: 100%;
      min-height: 52px;
      border: 2px solid #d9def0;
      border-radius: 12px;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      box-sizing: border-box;
      background: white;
    }

    .sheetControls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .choiceWrap {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      width: 100%;
      max-width: 340px;
      margin-top: 16px;
    }

    .choiceBtn, .relationBtn {
      min-height: 60px;
      border: none;
      border-radius: 16px;
      font-size: 28px;
      font-weight: bold;
      background: #f5f7ff;
      box-shadow: inset 0 0 0 2px #dde4ff;
      cursor: pointer;
    }

    .choiceBtn.good,
    .relationBtn.good {
      background: #edfff5;
      color: #0f8b50;
      box-shadow: inset 0 0 0 3px #18b368;
    }

    .choiceBtn.bad,
    .relationBtn.bad {
      background: #fff0f0;
      color: #c63939;
      box-shadow: inset 0 0 0 3px #e34d4d;
    }

    .relationWrap {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 340px;
      margin-top: 16px;
    }

    .levelBadge {
      margin-top: 12px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: #6f5cff;
    }

    .celebration {
      display: none;
      text-align: center;
      background: linear-gradient(#f6efff, #efe7ff);
      border-radius: 20px;
      padding: 16px;
    }

    .celebrationTitle {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .celebrationText {
      font-size: 18px;
      color: #4d3d9a;
    }

    canvas#fireworksCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }

    @media (max-width: 640px) {
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .settings {
        grid-template-columns: 1fr;
      }

      .expr {
        font-size: 40px;
      }

      .blank {
        min-width: 90px;
        min-height: 62px;
        line-height: 62px;
      }

      .magusAvatar {
        width: 100px;
        height: 100px;
      }

      .sheetRow {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <canvas id="fireworksCanvas"></canvas>

  <div class="wrap">
    <div id="debugBox" class="card debug"></div>

    <div class="card">
      <div class="magusBox">
        <img src="images/magus_1.png" alt="Lusta Mágus" class="magusAvatar">
        <div class="magusName">Lusta Mágus</div>
        <div class="magusSpeech" id="magusSpeech">Kezdjük a varázslást.</div>
      </div>

      <h1>Matek gyakorló 3.3</h1>
      <div class="sub">Lusta Mágussal</div>

      <div class="stats">
        <div class="stat">
          <div class="statValue" id="scoreValue">0</div>
          <div class="statLabel">Pont</div>
        </div>
        <div class="stat">
          <div class="statValue" id="streakValue">0</div>
          <div class="statLabel">Sorozat</div>
        </div>
        <div class="stat">
          <div class="statValue" id="starsValue">0</div>
          <div class="statLabel">Csillag</div>
        </div>
        <div class="stat">
          <div class="statValue" id="rangeValue">0–9</div>
          <div class="statLabel">Számkör</div>
        </div>
        <div class="stat">
          <div class="statValue" id="levelValue">Újonc</div>
          <div class="statLabel">Szint</div>
        </div>
      </div>

      <div class="levelBadge" id="levelBadge">Kezdésre kész</div>
    </div>

    <div class="card">
      <div class="settings">
        <div>
          <label for="minInput">Legkisebb szám</label>
          <input id="minInput" type="number" value="0">
        </div>
        <div>
          <label for="maxInput">Legnagyobb szám</label>
          <input id="maxInput" type="number" value="9">
        </div>
      </div>

      <div class="row">
        <button type="button" class="pill presetBtn" data-min="0" data-max="9">0–9</button>
        <button type="button" class="pill presetBtn" data-min="0" data-max="20">0–20</button>
        <button type="button" class="pill presetBtn" data-min="-10" data-max="10">-10–10</button>
        <button type="button" class="pill presetBtn" data-min="10" data-max="50">10–50</button>
      </div>

      <div class="row">
        <button type="button" class="pill taskType active" data-type="addsub">+ / -</button>
        <button type="button" class="pill taskType active" data-type="missing">Hiányzó tag</button>
        <button type="button" class="pill taskType active" data-type="relation">Reláció</button>
        <button type="button" class="pill taskType active" data-type="choice">3 válasz</button>
        <button type="button" class="pill taskType active" data-type="triple">3 elemű</button>
        <button type="button" class="pill" id="applyRangeBtn">Számkör frissítése</button>
      </div>
    </div>

    <div class="card">
      <div class="taskBox">
        <div class="taskTag" id="taskTag">Feladat</div>
        <div class="taskArea" id="taskArea">Betöltés...</div>
        <div class="message" id="message"></div>

        <div class="actions">
          <button type="button" class="bigBtn primaryBtn" id="checkBtn">Ellenőrzés</button>
          <button type="button" class="bigBtn yellowBtn" id="nextBtn">Következő</button>
        </div>

        <div class="numpad" id="numpad">
          <button type="button" class="key digitBtn" data-key="1">1</button>
          <button type="button" class="key digitBtn" data-key="2">2</button>
          <button type="button" class="key digitBtn" data-key="3">3</button>
          <button type="button" class="key digitBtn" data-key="4">4</button>
          <button type="button" class="key digitBtn" data-key="5">5</button>
          <button type="button" class="key digitBtn" data-key="6">6</button>
          <button type="button" class="key digitBtn" data-key="7">7</button>
          <button type="button" class="key digitBtn" data-key="8">8</button>
          <button type="button" class="key digitBtn" data-key="9">9</button>
          <button type="button" class="key keyNeg" id="minusBtn">−</button>
          <button type="button" class="key digitBtn" data-key="0">0</button>
          <button type="button" class="key keyAction" id="backBtn">⌫</button>
          <button type="button" class="key keyAction wide" id="clearBtn">Törlés</button>
          <button type="button" class="key keyAction" id="sheetBtn">10 sor</button>
        </div>

        <div class="hint" id="hintText">A számot az alsó gombokkal írd be.</div>
      </div>
    </div>

    <div class="card reward" id="rewardBox">
      <div class="rewardTitle">Ügyesen megy.</div>
      <div class="rewardText" id="rewardText">Bővítsem a számkört?</div>
      <div class="row" style="justify-content:center;">
        <button type="button" class="pill active" id="expandYesBtn">Igen</button>
        <button type="button" class="pill" id="expandNoBtn">Még ne</button>
      </div>
    </div>

    <div class="card celebration" id="celebrationBox">
      <div class="celebrationTitle" id="celebrationTitle">Szintlépés!</div>
      <div class="celebrationText" id="celebrationText">Folytasd tovább.</div>
    </div>

    <div class="card sheetCard" id="sheetCard">
      <div class="sheetTitle">Kitölthető 10 soros gyakorló</div>
      <div class="sheetTaskList" id="sheetTaskList"></div>
      <div class="sheetControls">
        <button type="button" class="pill active" id="sheetCheckBtn">Megoldások ellenőrzése</button>
        <button type="button" class="pill" id="sheetNewBtn">Új 10 sor</button>
      </div>
    </div>
  </div>

  <script>
    var debugBox = document.getElementById("debugBox");

    function showDebug(msg) {
      debugBox.style.display = "block";
      debugBox.textContent = msg;
    }

    window.onerror = function(msg, src, line, col) {
      showDebug("JS hiba: " + msg + "\nSor: " + line + "\nOszlop: " + col);
    };

    try {
      var state = {
        min: 0,
        max: 9,
        score: 0,
        streak: 0,
        stars: 0,
        answer: "",
        checked: false,
        task: null,
        enabledTypes: {
          addsub: true,
          missing: true,
          relation: true,
          choice: true,
          triple: true
        },
        lastExpandScore: -1,
        correctTotal: 0,
        lastLevelName: "Újonc",
        selectedChoice: null,
        selectedRelation: null,
        sheetTasks: []
      };

      var scoreValue = document.getElementById("scoreValue");
      var streakValue = document.getElementById("streakValue");
      var starsValue = document.getElementById("starsValue");
      var rangeValue = document.getElementById("rangeValue");
      var levelValue = document.getElementById("levelValue");
      var levelBadge = document.getElementById("levelBadge");
      var minInput = document.getElementById("minInput");
      var maxInput = document.getElementById("maxInput");
      var taskTag = document.getElementById("taskTag");
      var taskArea = document.getElementById("taskArea");
      var message = document.getElementById("message");
      var rewardBox = document.getElementById("rewardBox");
      var rewardText = document.getElementById("rewardText");
      var sheetCard = document.getElementById("sheetCard");
      var sheetTaskList = document.getElementById("sheetTaskList");
      var numpad = document.getElementById("numpad");
      var hintText = document.getElementById("hintText");
      var celebrationBox = document.getElementById("celebrationBox");
      var celebrationTitle = document.getElementById("celebrationTitle");
      var celebrationText = document.getElementById("celebrationText");
      var magusSpeech = document.getElementById("magusSpeech");

      function setSpeech(text) {
        magusSpeech.textContent = text;
      }

      function setMessage(text, cls) {
        message.className = "message";
        if (cls) message.className += " " + cls;
        message.textContent = text || "";
      }

      function clampRange() {
        var min = parseInt(minInput.value, 10);
        var max = parseInt(maxInput.value, 10);

        if (isNaN(min)) min = 0;
        if (isNaN(max)) max = 9;
        if (min > max) {
          var t = min;
          min = max;
          max = t;
        }

        state.min = min;
        state.max = max;
        minInput.value = String(min);
        maxInput.value = String(max);
      }

      function randInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = a[i];
          a[i] = a[j];
          a[j] = t;
        }
        return a;
      }

      function enabledList() {
        var arr = [];
        if (state.enabledTypes.addsub) arr.push("addsub");
        if (state.enabledTypes.missing) arr.push("missing");
        if (state.enabledTypes.relation) arr.push("relation");
        if (state.enabledTypes.choice) arr.push("choice");
        if (state.enabledTypes.triple) arr.push("triple");
        if (arr.length === 0) arr.push("addsub");
        return arr;
      }

      function pickFamily() {
        var arr = enabledList();
        return arr[randInt(0, arr.length - 1)];
      }

      function getLevelInfo(correctTotal) {
        if (correctTotal >= 50) return { name: "Mágusmester", nextAt: null };
        if (correctTotal >= 25) return { name: "Számmester", nextAt: 50 };
        if (correctTotal >= 10) return { name: "Matekmágus", nextAt: 25 };
        if (correctTotal >= 5) return { name: "Minimágus", nextAt: 10 };
        return { name: "Újonc", nextAt: 5 };
      }

      function updateStats() {
        var level = getLevelInfo(state.correctTotal);
        scoreValue.textContent = String(state.score);
        streakValue.textContent = String(state.streak);
        starsValue.textContent = String(state.stars);
        rangeValue.textContent = String(state.min) + "–" + String(state.max);
        levelValue.textContent = level.name;

        if (level.nextAt) {
          levelBadge.textContent = level.name + " • következő szint: " + level.nextAt + " helyes";
        } else {
          levelBadge.textContent = level.name + " • elérted a legmagasabb szintet";
        }
      }

      function maybeLevelUp() {
        var level = getLevelInfo(state.correctTotal);
        if (level.name !== state.lastLevelName) {
          state.lastLevelName = level.name;
          celebrationTitle.textContent = "Szintlépés: " + level.name + "!";
          celebrationText.textContent = "Egyre ügyesebb vagy a számolásban.";
          celebrationBox.style.display = "block";
          launchFireworks();
          setTimeout(function() {
            celebrationBox.style.display = "none";
          }, 3500);
          setSpeech("Szintet léptél. Ez már igazi mágia.");
        }
      }

      function maybeShowExpandPrompt() {
        if (state.score > 0 && state.score % 10 === 0 && state.lastExpandScore !== state.score) {
          state.lastExpandScore = state.score;
          rewardText.textContent = "Bővítsem a számkört? Most: " + state.min + "–" + state.max;
          rewardBox.style.display = "block";
        }
      }

      function speechForGood() {
        var lines = [
          "Szép volt.",
          "Ez bizony helyes.",
          "Ügyesen számoltál.",
          "A varázslat működik.",
          "Pontosan eltaláltad."
        ];
        setSpeech(lines[randInt(0, lines.length - 1)]);
      }

      function speechForBad() {
        var lines = [
          "Majdnem. Nézd meg újra.",
          "Semmi baj, próbáld még egyszer.",
          "Most nem ez lett a helyes.",
          "Ebből még tanulunk.",
          "Lassan, figyelmesen."
        ];
        setSpeech(lines[randInt(0, lines.length - 1)]);
      }

      function answerToString(val) {
        return String(val).replace("-", "−");
      }

      function createAddSubTask() {
        var a, b, op, result, tries = 0;

        do {
          a = randInt(state.min, state.max);
          b = randInt(state.min, state.max);
          op = Math.random() < 0.5 ? "+" : "−";
          result = op === "+" ? a + b : a - b;
          tries++;
        } while ((result < state.min || result > state.max) && tries < 500);

        return {
          type: "addsub",
          label: "Számolj",
          a: a,
          b: b,
          op: op,
          correct: result
        };
      }

      function createMissingTask() {
        var a, b, op, result, missingPos, tries = 0;

        do {
          a = randInt(state.min, state.max);
          b = randInt(state.min, state.max);
          op = Math.random() < 0.5 ? "+" : "−";
          result = op === "+" ? a + b : a - b;
          tries++;
        } while ((result < state.min || result > state.max) && tries < 500);

        missingPos = randInt(0, 2);

        return {
          type: "missing",
          label: "Hiányzó szám",
          a: a,
          b: b,
          op: op,
          result: result,
          missingPos: missingPos,
          correct: missingPos === 0 ? a : (missingPos === 1 ? b : result)
        };
      }

      function createRelationTask() {
        var a = randInt(state.min, state.max);
        var b = randInt(state.min, state.max);
        var correct = "=";
        if (a < b) correct = "<";
        if (a > b) correct = ">";
        return {
          type: "relation",
          label: "Reláció",
          a: a,
          b: b,
          correct: correct
        };
      }

      function createChoiceTask() {
        var base = createAddSubTask();
        var correct = base.correct;
        var options = [correct];

        while (options.length < 3) {
          var delta = randInt(-5, 5);
          if (delta === 0) delta = 1;
          var wrong = correct + delta;
          if (options.indexOf(wrong) === -1) options.push(wrong);
        }

        options = shuffle(options);

        return {
          type: "choice",
          label: "Válassz a 3 közül",
          a: base.a,
          b: base.b,
          op: base.op,
          options: options,
          correct: correct
        };
      }

      function createTripleTask() {
        var a, b, c, op1, op2, result, tries = 0;

        do {
          a = randInt(state.min, state.max);
          b = randInt(state.min, state.max);
          c = randInt(state.min, state.max);
          op1 = Math.random() < 0.5 ? "+" : "−";
          op2 = Math.random() < 0.5 ? "+" : "−";

          result = (op1 === "+" ? a + b : a - b);
          result = (op2 === "+" ? result + c : result - c);
          tries++;
        } while ((result < state.min || result > state.max) && tries < 800);

        return {
          type: "triple",
          label: "3 elemű feladat",
          a: a,
          b: b,
          c: c,
          op1: op1,
          op2: op2,
          correct: result
        };
      }

      function createTask() {
        clampRange();
        state.answer = "";
        state.checked = false;
        state.selectedChoice = null;
        state.selectedRelation = null;
        setMessage("", "");
        sheetCard.style.display = "none";

        var family = pickFamily();
        var t;

        if (family === "addsub") t = createAddSubTask();
        else if (family === "missing") t = createMissingTask();
        else if (family === "relation") t = createRelationTask();
        else if (family === "choice") t = createChoiceTask();
        else t = createTripleTask();

        state.task = t;
        renderTask();
        updateStats();
      }

      function currentAnswerDisplay() {
        if (state.task.type === "choice") {
          return state.selectedChoice === null ? "" : answerToString(state.selectedChoice);
        }
        if (state.task.type === "relation") {
          return state.selectedRelation === null ? "" : state.selectedRelation;
        }
        return state.answer === "" ? "" : answerToString(state.answer);
      }

      function renderTask() {
        var t = state.task;
        taskTag.textContent = t.label;

        if (t.type === "addsub") {
          taskArea.innerHTML =
            '<div class="expr">' +
            answerToString(t.a) + ' ' + t.op + ' ' + answerToString(t.b) + ' = ' +
            '<span class="blank ' + (state.answer !== "" ? "filled" : "") + '" id="answerBlank">' + currentAnswerDisplay() + '</span>' +
            '</div>';
          hintText.textContent = "A számot az alsó gombokkal írd be.";
          numpad.style.display = "grid";
        }

        if (t.type === "missing") {
          var left = t.missingPos === 0 ? '<span class="blank ' + (state.answer !== "" ? "filled" : "") + '" id="answerBlank">' + currentAnswerDisplay() + '</span>' : answerToString(t.a);
          var mid = t.missingPos === 1 ? '<span class="blank ' + (state.answer !== "" ? "filled" : "") + '" id="answerBlank">' + currentAnswerDisplay() + '</span>' : answerToString(t.b);
          var right = t.missingPos === 2 ? '<span class="blank ' + (state.answer !== "" ? "filled" : "") + '" id="answerBlank">' + currentAnswerDisplay() + '</span>' : answerToString(t.result);

          taskArea.innerHTML =
            '<div class="expr">' +
            left + ' ' + t.op + ' ' + mid + ' = ' + right +
            '</div>';
          hintText.textContent = "Találd meg a hiányzó számot.";
          numpad.style.display = "grid";
        }

        if (t.type === "relation") {
          taskArea.innerHTML =
            '<div class="expr">' +
            answerToString(t.a) + ' <span class="blank ' + (state.selectedRelation !== null ? "filled" : "") + '" id="answerBlank">' + currentAnswerDisplay() + '</span> ' + answerToString(t.b) +
            '</div>' +
            '<div class="relationWrap">' +
            '<button type="button" class="relationBtn" data-rel="<">&lt;</button>' +
            '<button type="button" class="relationBtn" data-rel=">">&gt;</button>' +
            '<button type="button" class="relationBtn" data-rel="=">=</button>' +
            '</div>';

          hintText.textContent = "Válaszd ki a helyes relációjelet.";
          numpad.style.display = "none";

          var relBtns = taskArea.querySelectorAll(".relationBtn");
          relBtns.forEach(function(btn) {
            btn.addEventListener("click", function() {
              if (state.checked) return;
              state.selectedRelation = btn.getAttribute("data-rel");
              renderTask();
            });
          });
        }

        if (t.type === "choice") {
          var html =
            '<div class="expr">' +
            answerToString(t.a) + ' ' + t.op + ' ' + answerToString(t.b) + ' = ?' +
            '</div>' +
            '<div class="choiceWrap">';
          for (var i = 0; i < t.options.length; i++) {
            var val = t.options[i];
            html += '<button type="button" class="choiceBtn" data-choice="' + val + '">' + answerToString(val) + '</button>';
          }
          html += '</div>';
          taskArea.innerHTML = html;
          hintText.textContent = "Koppints a helyes válaszra.";
          numpad.style.display = "none";

          var choiceBtns = taskArea.querySelectorAll(".choiceBtn");
          choiceBtns.forEach(function(btn) {
            btn.addEventListener("click", function() {
              if (state.checked) return;
              state.selectedChoice = parseInt(btn.getAttribute("data-choice"), 10);
              choiceBtns.forEach(function(b) {
                b.style.outline = "";
              });
              btn.style.outline = "4px solid #6f5cff";
            });
          });
        }

        if (t.type === "triple") {
          taskArea.innerHTML =
            '<div class="expr">' +
            answerToString(t.a) + ' ' + t.op1 + ' ' + answerToString(t.b) + ' ' + t.op2 + ' ' + answerToString(t.c) + ' = ' +
            '<span class="blank ' + (state.answer !== "" ? "filled" : "") + '" id="answerBlank">' + currentAnswerDisplay() + '</span>' +
            '</div>';
          hintText.textContent = "Számolj sorban balról jobbra.";
          numpad.style.display = "grid";
        }
      }

      function appendAnswer(ch) {
        if (state.checked) return;
        if (state.task.type === "choice" || state.task.type === "relation") return;

        if (ch === "-") {
          if (state.answer.indexOf("-") === -1 && state.answer.length === 0) {
            state.answer = "-";
          }
        } else {
          if (state.answer === "0") {
            state.answer = ch;
          } else if (state.answer === "-0") {
            state.answer = "-" + ch;
          } else {
            state.answer += ch;
          }
        }
        renderTask();
      }

      function backspaceAnswer() {
        if (state.checked) return;
        if (state.task.type === "choice" || state.task.type === "relation") return;
        state.answer = state.answer.slice(0, -1);
        renderTask();
      }

      function clearAnswer() {
        if (state.checked) return;

        if (state.task.type === "choice") {
          state.selectedChoice = null;
          renderTask();
          return;
        }

        if (state.task.type === "relation") {
          state.selectedRelation = null;
          renderTask();
          return;
        }

        state.answer = "";
        renderTask();
      }

      function getUserValue() {
        if (state.task.type === "choice") return state.selectedChoice;
        if (state.task.type === "relation") return state.selectedRelation;
        if (state.answer === "" || state.answer === "-") return null;
        return parseInt(state.answer, 10);
      }

      function markCorrectUI() {
        if (state.task.type === "choice") {
          var buttons = taskArea.querySelectorAll(".choiceBtn");
          buttons.forEach(function(btn) {
            var val = parseInt(btn.getAttribute("data-choice"), 10);
            if (val === state.task.correct) btn.classList.add("good");
          });
        } else if (state.task.type === "relation") {
          var relButtons = taskArea.querySelectorAll(".relationBtn");
          relButtons.forEach(function(btn) {
            if (btn.getAttribute("data-rel") === state.task.correct) btn.classList.add("good");
          });
          var blank = document.getElementById("answerBlank");
          if (blank) blank.classList.add("good");
        } else {
          var blank2 = document.getElementById("answerBlank");
          if (blank2) blank2.classList.add("good");
        }
      }

      function markWrongUI() {
        if (state.task.type === "choice") {
          var buttons = taskArea.querySelectorAll(".choiceBtn");
          buttons.forEach(function(btn) {
            var val = parseInt(btn.getAttribute("data-choice"), 10);
            if (val === state.task.correct) btn.classList.add("good");
            if (state.selectedChoice !== null && val === state.selectedChoice && val !== state.task.correct) {
              btn.classList.add("bad");
            }
          });
        } else if (state.task.type === "relation") {
          var relButtons = taskArea.querySelectorAll(".relationBtn");
          relButtons.forEach(function(btn) {
            var rel = btn.getAttribute("data-rel");
            if (rel === state.task.correct) btn.classList.add("good");
            if (state.selectedRelation !== null && rel === state.selectedRelation && rel !== state.task.correct) {
              btn.classList.add("bad");
            }
          });
          var blank = document.getElementById("answerBlank");
          if (blank) blank.classList.add("bad");
        } else {
          var blank2 = document.getElementById("answerBlank");
          if (blank2) blank2.classList.add("bad");
        }
      }

      function checkAnswer() {
        if (state.checked) return;

        var val = getUserValue();
        if (val === null || val === "") {
          setMessage("Adj meg egy választ.", "messageInfo");
          setSpeech("Előbb írj be valamit.");
          return;
        }

        state.checked = true;

        if (val === state.task.correct) {
          state.score += 1;
          state.streak += 1;
          state.correctTotal += 1;
          if (state.streak % 5 === 0) state.stars += 1;

          markCorrectUI();
          setMessage("Helyes!", "messageGood");
          speechForGood();
          maybeLevelUp();
          maybeShowExpandPrompt();
        } else {
          state.streak = 0;
          markWrongUI();
          setMessage("Nem jó. Helyes: " + answerToString(state.task.correct), "messageBad");
          speechForBad();
        }

        updateStats();
      }

      function taskToSheetRowText(t) {
        if (t.type === "addsub") {
          return answerToString(t.a) + " " + t.op + " " + answerToString(t.b) + " =";
        }

        if (t.type === "missing") {
          var left = t.missingPos === 0 ? "□" : answerToString(t.a);
          var mid = t.missingPos === 1 ? "□" : answerToString(t.b);
          var right = t.missingPos === 2 ? "□" : answerToString(t.result);
          return left + " " + t.op + " " + mid + " = " + right;
        }

        if (t.type === "relation") {
          return answerToString(t.a) + " ? " + answerToString(t.b);
        }

        if (t.type === "choice") {
          return answerToString(t.a) + " " + t.op + " " + answerToString(t.b) + " =";
        }

        return answerToString(t.a) + " " + t.op1 + " " + answerToString(t.b) + " " + t.op2 + " " + answerToString(t.c) + " =";
      }

      function makeSheet() {
        clampRange();
        state.sheetTasks = [];
        sheetTaskList.innerHTML = "";

        for (var i = 0; i < 10; i++) {
          var family = pickFamily();
          var t;

          if (family === "addsub") t = createAddSubTask();
          else if (family === "missing") t = createMissingTask();
          else if (family === "relation") t = createRelationTask();
          else if (family === "choice") t = createChoiceTask();
          else t = createTripleTask();

          state.sheetTasks.push(t);

          var row = document.createElement("div");
          row.className = "sheetRow";

          var label = document.createElement("div");
          label.textContent = (i + 1) + ".  " + taskToSheetRowText(t);

          var input = document.createElement("input");
          input.className = "sheetAnswer";
          input.setAttribute("data-index", i);

          if (t.type === "relation") {
            input.type = "text";
            input.maxLength = 1;
            input.placeholder = "<";
          } else {
            input.type = "text";
            input.inputMode = "numeric";
            input.placeholder = "?";
          }

          row.appendChild(label);
          row.appendChild(input);
          sheetTaskList.appendChild(row);
        }

        sheetCard.style.display = "block";
        setSpeech("Itt a kitölthető tízsoros.");
      }

      function checkSheet() {
        if (!state.sheetTasks.length) return;

        var inputs = sheetTaskList.querySelectorAll(".sheetAnswer");
        var goodCount = 0;

        inputs.forEach(function(input, idx) {
          var t = state.sheetTasks[idx];
          var raw = input.value.trim();
          var value;

          if (t.type === "relation") {
            value = raw;
          } else {
            if (raw === "" || raw === "-") {
              input.classList.remove("good", "bad");
              return;
            }
            value = parseInt(raw, 10);
            if (isNaN(value)) {
              input.classList.remove("good");
              input.classList.add("bad");
              return;
            }
          }

          if (value === t.correct) {
            input.classList.remove("bad");
            input.classList.add("good");
            goodCount++;
          } else {
            input.classList.remove("good");
            input.classList.add("bad");
          }
        });

        setSpeech("Ellenőriztem a gyakorlót.");
        setMessage("10 sorból " + goodCount + " helyes.", goodCount === 10 ? "messageGood" : "messageInfo");
      }

      function expandRange() {
        state.min -= 5;
        state.max += 5;
        minInput.value = String(state.min);
        maxInput.value = String(state.max);
        rewardBox.style.display = "none";
        updateStats();
        createTask();
        setSpeech("Bővítettem a számkört.");
      }

      function keepRange() {
        rewardBox.style.display = "none";
        setSpeech("Maradunk ennél a számkörnél.");
      }

      function launchFireworks() {
        var canvas = document.getElementById("fireworksCanvas");
        var ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        var particles = [];
        for (var i = 0; i < 120; i++) {
          particles.push({
            x: canvas.width / 2,
            y: canvas.height / 2,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10,
            life: 60 + Math.random() * 20,
            size: 2 + Math.random() * 3,
            hue: Math.random() * 360
          });
        }

        var frame = 0;
        function tick() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles.forEach(function(p) {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.05;
            p.life -= 1;
            ctx.beginPath();
            ctx.fillStyle = "hsla(" + p.hue + ", 100%, 60%, " + Math.max(p.life / 80, 0) + ")";
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
          });
          particles = particles.filter(function(p) { return p.life > 0; });
          frame++;
          if (particles.length > 0 && frame < 90) {
            requestAnimationFrame(tick);
          } else {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
          }
        }
        tick();
      }

      document.querySelectorAll(".presetBtn").forEach(function(btn) {
        btn.addEventListener("click", function() {
          minInput.value = btn.getAttribute("data-min");
          maxInput.value = btn.getAttribute("data-max");
          clampRange();
          updateStats();
          createTask();
        });
      });

      document.querySelectorAll(".taskType").forEach(function(btn) {
        btn.addEventListener("click", function() {
          var type = btn.getAttribute("data-type");
          state.enabledTypes[type] = !state.enabledTypes[type];
          btn.classList.toggle("active", state.enabledTypes[type]);
          createTask();
        });
      });

      document.getElementById("applyRangeBtn").addEventListener("click", function() {
        clampRange();
        updateStats();
        createTask();
        setSpeech("Frissítettem a számkört.");
      });

      document.querySelectorAll(".digitBtn").forEach(function(btn) {
        btn.addEventListener("click", function() {
          appendAnswer(btn.getAttribute("data-key"));
        });
      });

      document.getElementById("minusBtn").addEventListener("click", function() {
        appendAnswer("-");
      });

      document.getElementById("backBtn").addEventListener("click", backspaceAnswer);
      document.getElementById("clearBtn").addEventListener("click", clearAnswer);
      document.getElementById("checkBtn").addEventListener("click", checkAnswer);
      document.getElementById("nextBtn").addEventListener("click", createTask);
      document.getElementById("sheetBtn").addEventListener("click", makeSheet);
      document.getElementById("sheetCheckBtn").addEventListener("click", checkSheet);
      document.getElementById("sheetNewBtn").addEventListener("click", makeSheet);
      document.getElementById("expandYesBtn").addEventListener("click", expandRange);
      document.getElementById("expandNoBtn").addEventListener("click", keepRange);

      document.addEventListener("keydown", function(e) {
        if (!state.task) return;

        if (e.key >= "0" && e.key <= "9") appendAnswer(e.key);
        else if (e.key === "-") appendAnswer("-");
        else if (e.key === "Backspace") backspaceAnswer();
        else if (e.key === "Delete") clearAnswer();
        else if (e.key === "Enter") {
          if (state.checked) createTask();
          else checkAnswer();
        }
      });

      clampRange();
      updateStats();
      createTask();
      setSpeech("Kezdjük a varázslást.");
    } catch (err) {
      showDebug("Indítási hiba:\n" + err.message + "\n\n" + err.stack);
    }
  </script>
</body>
</html>
