<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matek gyakorló 3.0</title>
  <style>
    body {
      margin: 0;
      padding: 14px;
      font-family: Arial, sans-serif;
      background: linear-gradient(#f7f4ff, #eef6ff);
      color: #1f2430;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      position: relative;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.12);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 30px;
    }

    .sub {
      text-align: center;
      color: #667085;
      margin-bottom: 10px;
    }

    .debug {
      display: none;
      white-space: pre-wrap;
      color: #a40000;
      background: #fff1f1;
      border: 2px solid #efb5b5;
      border-radius: 16px;
      padding: 12px;
      font-weight: bold;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .stat {
      background: #f6f8ff;
      border-radius: 16px;
      text-align: center;
      padding: 12px 8px;
    }

    .statValue {
      font-size: 22px;
      font-weight: bold;
    }

    .statLabel {
      font-size: 12px;
      color: #667085;
      margin-top: 4px;
    }

    .settings {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      display: block;
      font-size: 14px;
      color: #667085;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input[type="number"] {
      width: 100%;
      min-height: 52px;
      border: 2px solid #d9def0;
      border-radius: 14px;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      box-sizing: border-box;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .pill {
      border: none;
      border-radius: 999px;
      padding: 12px 14px;
      background: #eef2ff;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    .pill.active {
      background: #6f5cff;
      color: white;
    }

    .taskType {
      cursor: pointer;
    }

    .taskTag {
      display: inline-block;
      background: #eef2ff;
      color: #40506f;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .taskBox {
      text-align: center;
    }

    .taskArea {
      min-height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex-direction: column;
    }

    .expr {
      font-size: 52px;
      font-weight: bold;
      line-height: 1.2;
    }

    .blank {
      display: inline-block;
      min-width: 110px;
      min-height: 70px;
      line-height: 70px;
      border-radius: 16px;
      border: 4px dashed #bcc7e8;
      background: #fbfcff;
      vertical-align: middle;
      margin: 0 4px;
      padding: 0 10px;
      box-sizing: border-box;
    }

    .filled {
      border-style: solid;
      border-color: #cad4f0;
    }

    .good {
      border-color: #18b368;
      background: #edfff5;
      color: #0f8b50;
    }

    .bad {
      border-color: #e34d4d;
      background: #fff0f0;
      color: #c63939;
    }

    .relationDiff {
      margin-top: 10px;
      font-size: 24px;
      font-weight: bold;
      color: #275b98;
      background: #eef6ff;
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
    }

    .message {
      min-height: 34px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      margin-top: 8px;
    }

    .messageGood { color: #18b368; }
    .messageBad { color: #e34d4d; }
    .messageInfo { color: #3f7cff; }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .bigBtn {
      min-height: 60px;
      border: none;
      border-radius: 16px;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
    }

    .primaryBtn {
      background: #6f5cff;
      color: white;
    }

    .yellowBtn {
      background: #ffd84d;
      color: #2f2a14;
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .key {
      min-height: 74px;
      border: none;
      border-radius: 16px;
      font-size: 30px;
      font-weight: bold;
      background: #f5f7ff;
      box-shadow: inset 0 0 0 2px #dde4ff;
      cursor: pointer;
    }

    .keyAction {
      background: #eaf6ff;
      color: #245f9d;
      font-size: 22px;
    }

    .keyNeg {
      background: #fff7ea;
      color: #7b5d17;
    }

    .wide {
      grid-column: span 2;
    }

    .hint {
      margin-top: 8px;
      text-align: center;
      color: #667085;
      font-size: 14px;
    }

    .reward {
      display: none;
      text-align: center;
      background: linear-gradient(#fffbe8, #fff4c9);
      border-radius: 20px;
      padding: 16px;
    }

    .rewardTitle {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .rewardText {
      font-size: 17px;
      margin-bottom: 12px;
      color: #5c4a14;
    }

    .sheetCard {
      display: none;
    }

    .sheetTitle {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .sheetOutput {
      white-space: pre-line;
      font-size: 22px;
      line-height: 1.8;
    }

    .choiceWrap {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      width: 100%;
      max-width: 340px;
      margin-top: 16px;
    }

    .choiceBtn {
      min-height: 60px;
      border: none;
      border-radius: 16px;
      font-size: 28px;
      font-weight: bold;
      background: #f5f7ff;
      box-shadow: inset 0 0 0 2px #dde4ff;
      cursor: pointer;
    }

    .choiceBtn.good {
      background: #edfff5;
      color: #0f8b50;
      box-shadow: inset 0 0 0 3px #18b368;
    }

    .choiceBtn.bad {
      background: #fff0f0;
      color: #c63939;
      box-shadow: inset 0 0 0 3px #e34d4d;
    }

    .levelBadge {
      margin-top: 12px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: #6f5cff;
    }

    .celebration {
      display: none;
      text-align: center;
      background: linear-gradient(#f6efff, #efe7ff);
      border-radius: 20px;
      padding: 16px;
    }

    .celebrationTitle {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .celebrationText {
      font-size: 18px;
      color: #4d3d9a;
    }

    canvas#fireworksCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }

    @media (max-width: 640px) {
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .settings {
        grid-template-columns: 1fr;
      }

      .expr {
        font-size: 40px;
      }

      .blank {
        min-width: 90px;
        min-height: 62px;
        line-height: 62px;
      }
    }
  </style>
</head>
<body>
  <canvas id="fireworksCanvas"></canvas>

  <div class="wrap">
    <div id="debugBox" class="card debug"></div>

    <div class="card">
      <h1>Matek gyakorló 3.0</h1>
      <div class="sub">Új feladattípusokkal, szintekkel és ünnepléssel</div>

      <div class="stats">
        <div class="stat">
          <div class="statValue" id="scoreValue">0</div>
          <div class="statLabel">Pont</div>
        </div>
        <div class="stat">
          <div class="statValue" id="streakValue">0</div>
          <div class="statLabel">Sorozat</div>
        </div>
        <div class="stat">
          <div class="statValue" id="starsValue">0</div>
          <div class="statLabel">Csillag</div>
        </div>
        <div class="stat">
          <div class="statValue" id="rangeValue">0–9</div>
          <div class="statLabel">Számkör</div>
        </div>
        <div class="stat">
          <div class="statValue" id="levelValue">Újonc</div>
          <div class="statLabel">Szint</div>
        </div>
      </div>

      <div class="levelBadge" id="levelBadge">Kezdésre kész</div>
    </div>

    <div class="card">
      <div class="settings">
        <div>
          <label for="minInput">Legkisebb szám</label>
          <input id="minInput" type="number" value="0">
        </div>
        <div>
          <label for="maxInput">Legnagyobb szám</label>
          <input id="maxInput" type="number" value="9">
        </div>
      </div>

      <div class="row">
        <button type="button" class="pill presetBtn" data-min="0" data-max="9">0–9</button>
        <button type="button" class="pill presetBtn" data-min="0" data-max="20">0–20</button>
        <button type="button" class="pill presetBtn" data-min="-10" data-max="10">-10–10</button>
        <button type="button" class="pill presetBtn" data-min="10" data-max="50">10–50</button>
      </div>

      <div class="row">
        <button type="button" class="pill taskType active" data-type="addsub">+ / -</button>
        <button type="button" class="pill taskType active" data-type="missing">Hiányzó tag</button>
        <button type="button" class="pill taskType active" data-type="relation">Reláció</button>
        <button type="button" class="pill taskType active" data-type="choice">3 válasz</button>
        <button type="button" class="pill taskType active" data-type="triple">3 elemű</button>
        <button type="button" class="pill" id="applyRangeBtn">Számkör frissítése</button>
      </div>
    </div>

    <div class="card">
      <div class="taskBox">
        <div class="taskTag" id="taskTag">Feladat</div>
        <div class="taskArea" id="taskArea">Betöltés...</div>
        <div class="message" id="message"></div>

        <div class="actions">
          <button type="button" class="bigBtn primaryBtn" id="checkBtn">Ellenőrzés</button>
          <button type="button" class="bigBtn yellowBtn" id="nextBtn">Következő</button>
        </div>

        <div class="numpad" id="numpad">
          <button type="button" class="key digitBtn" data-key="1">1</button>
          <button type="button" class="key digitBtn" data-key="2">2</button>
          <button type="button" class="key digitBtn" data-key="3">3</button>
          <button type="button" class="key digitBtn" data-key="4">4</button>
          <button type="button" class="key digitBtn" data-key="5">5</button>
          <button type="button" class="key digitBtn" data-key="6">6</button>
          <button type="button" class="key digitBtn" data-key="7">7</button>
          <button type="button" class="key digitBtn" data-key="8">8</button>
          <button type="button" class="key digitBtn" data-key="9">9</button>
          <button type="button" class="key keyNeg" id="minusBtn">−</button>
          <button type="button" class="key digitBtn" data-key="0">0</button>
          <button type="button" class="key keyAction" id="backBtn">⌫</button>
          <button type="button" class="key keyAction wide" id="clearBtn">Törlés</button>
          <button type="button" class="key keyAction" id="sheetBtn">10 sor</button>
        </div>

        <div class="hint" id="hintText">A számot az alsó gombokkal írd be.</div>
      </div>
    </div>

    <div class="card reward" id="rewardBox">
      <div class="rewardTitle">Ügyesen megy.</div>
      <div class="rewardText" id="rewardText">Bővítsem a számkört?</div>
      <div class="row" style="justify-content:center;">
        <button type="button" class="pill active" id="expandYesBtn">Igen</button>
        <button type="button" class="pill" id="expandNoBtn">Még ne</button>
      </div>
    </div>

    <div class="card celebration" id="celebrationBox">
      <div class="celebrationTitle" id="celebrationTitle">Szintlépés!</div>
      <div class="celebrationText" id="celebrationText">Folytasd tovább.</div>
    </div>

    <div class="card sheetCard" id="sheetCard">
      <div class="sheetTitle">Gyakorló feladatsor</div>
      <div class="sheetOutput" id="sheetOutput"></div>
    </div>
  </div>

  <script>
    var debugBox = document.getElementById("debugBox");

    function showDebug(msg) {
      debugBox.style.display = "block";
      debugBox.textContent = msg;
    }

    window.onerror = function(msg, src, line, col) {
      showDebug("JS hiba: " + msg + "\nSor: " + line + "\nOszlop: " + col);
    };

    try {
      var state = {
        min: 0,
        max: 9,
        score: 0,
        streak: 0,
        stars: 0,
        answer: "",
        checked: false,
        task: null,
        enabledTypes: {
          addsub: true,
          missing: true,
          relation: true,
          choice: true,
          triple: true
        },
        lastExpandScore: -1,
        correctTotal: 0,
        lastLevelName: "Újonc",
        selectedChoice: null
      };

      var scoreValue = document.getElementById("scoreValue");
      var streakValue = document.getElementById("streakValue");
      var starsValue = document.getElementById("starsValue");
      var rangeValue = document.getElementById("rangeValue");
      var levelValue = document.getElementById("levelValue");
      var levelBadge = document.getElementById("levelBadge");
      var minInput = document.getElementById("minInput");
      var maxInput = document.getElementById("maxInput");
      var taskTag = document.getElementById("taskTag");
      var taskArea = document.getElementById("taskArea");
      var message = document.getElementById("message");
      var rewardBox = document.getElementById("rewardBox");
      var rewardText = document.getElementById("rewardText");
      var sheetCard = document.getElementById("sheetCard");
      var sheetOutput = document.getElementById("sheetOutput");
      var numpad = document.getElementById("numpad");
      var hintText = document.getElementById("hintText");
      var celebrationBox = document.getElementById("celebrationBox");
      var celebrationTitle = document.getElementById("celebrationTitle");
      var celebrationText = document.getElementById("celebrationText");

      function setMessage(text, cls) {
        message.className = "message";
        if (cls) {
          message.className += " " + cls;
        }
        message.textContent = text || "";
      }

      function clampRange() {
        var min = parseInt(minInput.value, 10);
        var max = parseInt(maxInput.value, 10);

        if (isNaN(min)) min = 0;
        if (isNaN(max)) max = 9;
        if (min > max) {
          var t = min;
          min = max;
          max = t;
        }

        state.min = min;
        state.max = max;
        minInput.value = String(min);
        maxInput.value = String(max);
      }

      function randInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function shuffle(arr) {
        var a = arr.slice();
        var i, j, t;
        for (i = a.length - 1; i > 0; i--) {
          j = Math.floor(Math.random() * (i + 1));
          t = a[i];
          a[i] = a[j];
          a[j] = t;
        }
        return a;
      }

      function enabledList() {
        var arr = [];
        if (state.enabledTypes.addsub) arr.push("addsub");
        if (state.enabledTypes.missing) arr.push("missing");
        if (state.enabledTypes.relation) arr.push("relation");
        if (state.enabledTypes.choice) arr.push("choice");
        if (state.enabledTypes.triple) arr.push("triple");
        if (arr.length === 0) arr.push("addsub");
        return arr;
      }

      function pickFamily() {
        var arr = enabledList();
        return arr[randInt(0, arr.length - 1)];
      }

      function getLevelInfo(correctTotal) {
        if (correctTotal >= 50) {
          return { name: "Mágusmester", nextAt: null };
        }
        if (correctTotal >= 25) {
          return { name: "Számmester", nextAt: 50 };
        }
        if (correctTotal >= 10) {
          return { name: "Matekmágus", nextAt: 25 };
        }
        if (correctTotal >= 5) {
          return { name: "Minimágus", nextAt: 10 };
        }
        return { name: "Újonc", nextAt: 5 };
      }

      function updateStats() {
        var level = getLevelInfo(state.correctTotal);
        scoreValue.textContent = String(state.score);
        streakValue.textContent = String(state.streak);
        starsValue.textContent = String(state.stars);
        rangeValue.textContent = String(state.min) + "–" + String(state.max);
        levelValue.textContent = level.name;

        if (level.nextAt) {
          levelBadge.textContent = level.name + " • következő szint: " + level.nextAt + " helyes";
        } else {
          levelBadge.textContent = level.name + " • elérted a legmagasabb szintet";
        }
      }

      function maybeLevelUp() {
        var level = getLevelInfo(state.correctTotal);
        if (level.name !== state.lastLevelName) {
          state.lastLevelName = level.name;
          celebrationTitle.textContent = "Szintlépés!";
          celebrationText.textContent = "Új szinted: " + level.name;
          celebrationBox.style.display = "block";
          startFireworks();
        }
      }

      function maybeCelebrateFive() {
        if (state.correctTotal > 0 && state.correctTotal % 5 === 0) {
          celebrationTitle.textContent = "Ünneplés!";
          celebrationText.textContent = "Már " + state.correctTotal + " helyes megoldásod van.";
          celebrationBox.style.display = "block";
          startFireworks();
        }
      }

      function makeAddSubTask() {
        var tries = 0;
        while (tries < 500) {
          tries++;
          var op = Math.random() < 0.5 ? "+" : "-";
          var a = randInt(state.min, state.max);
          var b = randInt(state.min, state.max);
          var result = op === "+" ? a + b : a - b;
          if (result >= state.min && result <= state.max) {
            return {
              family: "addsub",
              label: op === "+" ? "Összeadás" : "Kivonás",
              a: a,
              b: b,
              op: op,
              answer: String(result)
            };
          }
        }
        return { family: "addsub", label: "Összeadás", a: 2, b: 3, op: "+", answer: "5" };
      }

      function makeMissingTask() {
        var tries = 0;
        while (tries < 500) {
          tries++;
          var op = Math.random() < 0.5 ? "+" : "-";
          var a = randInt(state.min, state.max);
          var b = randInt(state.min, state.max);
          var result = op === "+" ? a + b : a - b;
          if (result >= state.min && result <= state.max) {
            var leftBlank = Math.random() < 0.5;
            return {
              family: "missing",
              label: "Hiányzó tag",
              leftBlank: leftBlank,
              a: leftBlank ? null : a,
              b: leftBlank ? b : null,
              op: op,
              result: result,
              answer: leftBlank ? String(a) : String(b)
            };
          }
        }
        return { family: "missing", label: "Hiányzó tag", leftBlank: false, a: 7, b: null, op: "+", result: 9, answer: "2" };
      }

      function makeRelationTask() {
        var tries = 0;
        while (tries < 500) {
          tries++;
          var diff = randInt(1, Math.max(1, Math.min(9, Math.abs(state.max - state.min))));
          var sign = Math.random() < 0.5 ? "<" : ">";
          var blankLeft = Math.random() < 0.5;
          var known = randInt(state.min, state.max);
          var unknown;

          if (blankLeft) {
            if (sign === "<") unknown = known - diff;
            else unknown = known + diff;
          } else {
            if (sign === "<") unknown = known + diff;
            else unknown = known - diff;
          }

          if (unknown >= state.min && unknown <= state.max) {
            return {
              family: "relation",
              label: "Reláció és különbség",
              blankLeft: blankLeft,
              known: known,
              sign: sign,
              diff: diff,
              answer: String(unknown)
            };
          }
        }
        return { family: "relation", label: "Reláció és különbség", blankLeft: false, known: 4, sign: "<", diff: 2, answer: "6" };
      }

      function makeChoiceTask() {
        var baseTask = makeAddSubTask();
        var correct = parseInt(baseTask.answer, 10);
        var options = [correct];
        var tries = 0;

        while (options.length < 3 && tries < 100) {
          tries++;
          var delta = randInt(1, 6);
          var candidate = correct + (Math.random() < 0.5 ? -delta : delta);
          if (candidate >= state.min && candidate <= state.max && options.indexOf(candidate) === -1) {
            options.push(candidate);
          }
        }

        while (options.length < 3) {
          var fallback = correct + options.length;
          if (options.indexOf(fallback) === -1) options.push(fallback);
        }

        return {
          family: "choice",
          label: "Válaszd ki a jót",
          a: baseTask.a,
          b: baseTask.b,
          op: baseTask.op,
          answer: String(correct),
          options: shuffle(options)
        };
      }

      function makeTripleTask() {
        var tries = 0;
        while (tries < 700) {
          tries++;
          var a = randInt(state.min, state.max);
          var b = randInt(state.min, state.max);
          var c = randInt(state.min, state.max);
          var op1 = Math.random() < 0.5 ? "+" : "-";
          var op2 = Math.random() < 0.5 ? "+" : "-";
          var result;

          if (op1 === "+") result = a + b;
          else result = a - b;

          if (op2 === "+") result = result + c;
          else result = result - c;

          if (result >= state.min && result <= state.max) {
            return {
              family: "triple",
              label: "3 elemű művelet",
              a: a,
              b: b,
              c: c,
              op1: op1,
              op2: op2,
              answer: String(result)
            };
          }
        }

        return {
          family: "triple",
          label: "3 elemű művelet",
          a: 5,
          b: 3,
          c: 1,
          op1: "+",
          op2: "+",
          answer: "9"
        };
      }

      function generateTask() {
        clampRange();
        var family = pickFamily();

        if (family === "addsub") return makeAddSubTask();
        if (family === "missing") return makeMissingTask();
        if (family === "relation") return makeRelationTask();
        if (family === "choice") return makeChoiceTask();
        return makeTripleTask();
      }

      function normalizeAnswer(s) {
        if (s === "" || s === "-") return s;
        return String(parseInt(s, 10));
      }

      function blankClass() {
        if (!state.answer) return "blank";
        if (!state.checked) return "blank filled";
        if (normalizeAnswer(state.answer) === state.task.answer) return "blank filled good";
        return "blank filled bad";
      }

      function blankText() {
        if (!state.answer) return "___";
        return state.answer.replace("-", "−");
      }

      function updateInputMode() {
        if (!state.task || state.task.family === "choice") {
          numpad.style.display = "none";
          document.getElementById("checkBtn").style.display = "none";
          hintText.textContent = "Koppints a helyes válaszra.";
        } else {
          numpad.style.display = "grid";
          document.getElementById("checkBtn").style.display = "block";
          hintText.textContent = "A számot az alsó gombokkal írd be.";
        }
      }

      function renderChoiceButtons(options) {
        var html = '<div class="choiceWrap">';
        for (var i = 0; i < options.length; i++) {
          var val = options[i];
          var cls = "choiceBtn";
          if (state.checked) {
            if (String(val) === state.task.answer) cls += " good";
            else if (state.selectedChoice !== null && String(val) === String(state.selectedChoice)) cls += " bad";
          }
          html += '<button type="button" class="' + cls + '" onclick="window.selectChoice(' + val + ')">' + String(val).replace("-", "−") + '</button>';
        }
        html += '</div>';
        return html;
      }

      function renderTask() {
        if (!state.task) {
          taskArea.innerHTML = "Nincs feladat";
          return;
        }

        var t = state.task;
        var cls = blankClass();
        var txt = blankText();

        taskTag.textContent = t.label;
        updateInputMode();

        if (t.family === "addsub") {
          taskArea.innerHTML =
            '<div class="expr">' +
            '<span>' + t.a + '</span> ' +
            '<span>' + (t.op === "-" ? "−" : "+") + '</span> ' +
            '<span>' + t.b + '</span> ' +
            '<span>=</span> ' +
            '<span class="' + cls + '">' + txt + '</span>' +
            '</div>';
          return;
        }

        if (t.family === "missing") {
          taskArea.innerHTML =
            '<div class="expr">' +
            (t.leftBlank ? '<span class="' + cls + '">' + txt + '</span>' : '<span>' + t.a + '</span>') +
            ' <span>' + (t.op === "-" ? "−" : "+") + '</span> ' +
            (t.leftBlank ? '<span>' + t.b + '</span>' : '<span class="' + cls + '">' + txt + '</span>') +
            ' <span>=</span> ' +
            '<span>' + t.result + '</span>' +
            '</div>';
          return;
        }

        if (t.family === "relation") {
          taskArea.innerHTML =
            '<div>' +
            '<div class="expr">' +
            (t.blankLeft ? '<span class="' + cls + '">' + txt + '</span>' : '<span>' + t.known + '</span>') +
            ' <span>' + t.sign + '</span> ' +
            (t.blankLeft ? '<span>' + t.known + '</span>' : '<span class="' + cls + '">' + txt + '</span>') +
            '</div>' +
            '<div class="relationDiff">' + t.diff + '</div>' +
            '</div>';
          return;
        }

        if (t.family === "choice") {
          taskArea.innerHTML =
            '<div>' +
            '<div class="expr">' +
            '<span>' + t.a + '</span> ' +
            '<span>' + (t.op === "-" ? "−" : "+") + '</span> ' +
            '<span>' + t.b + '</span> ' +
            '<span>=</span>' +
            '</div>' +
            renderChoiceButtons(t.options) +
            '</div>';
          return;
        }

        if (t.family === "triple") {
          taskArea.innerHTML =
            '<div class="expr">' +
            '<span>' + t.a + '</span> ' +
            '<span>' + (t.op1 === "-" ? "−" : "+") + '</span> ' +
            '<span>' + t.b + '</span> ' +
            '<span>' + (t.op2 === "-" ? "−" : "+") + '</span> ' +
            '<span>' + t.c + '</span> ' +
            '<span>=</span> ' +
            '<span class="' + cls + '">' + txt + '</span>' +
            '</div>';
          return;
        }
      }

      function hideReward() {
        rewardBox.style.display = "none";
      }

      function maybeOfferExpansion() {
        if (state.streak < 5) return;
        if (state.score === state.lastExpandScore) return;

        state.lastExpandScore = state.score;

        var nextMin = state.min;
        var nextMax = state.max;

        if (state.min >= 0) nextMax = state.max + 5;
        else {
          nextMin = state.min - 5;
          nextMax = state.max + 5;
        }

        rewardBox.setAttribute("data-next-min", String(nextMin));
        rewardBox.setAttribute("data-next-max", String(nextMax));
        rewardText.textContent = "Szeretnéd bővíteni a számkört " + state.min + "–" + state.max + " helyett " + nextMin + "–" + nextMax + " tartományra?";
        rewardBox.style.display = "block";
      }

      function newTask() {
        state.task = generateTask();
        state.answer = "";
        state.checked = false;
        state.selectedChoice = null;
        setMessage("", "");
        hideReward();
        renderTask();
        updateStats();
      }

      function addChar(ch) {
        if (state.checked) return;
        if (!state.task || state.task.family === "choice") return;

        if (ch === "-") {
          if (state.min < 0 && state.answer.length === 0) {
            state.answer = "-";
            renderTask();
          }
          return;
        }

        if (state.answer === "0") state.answer = ch;
        else if (state.answer === "-0") state.answer = "-" + ch;
        else state.answer += ch;

        state.answer = normalizeAnswer(state.answer);
        renderTask();
      }

      function backspace() {
        if (state.checked) return;
        if (!state.task || state.task.family === "choice") return;
        state.answer = state.answer.slice(0, -1);
        renderTask();
      }

      function clearAnswer() {
        if (state.checked) return;
        if (!state.task || state.task.family === "choice") return;
        state.answer = "";
        renderTask();
      }

      function rewardCorrect() {
        state.score += 10;
        state.streak += 1;
        state.correctTotal += 1;
        if (state.streak % 3 === 0) state.stars += 1;

        maybeLevelUp();
        maybeCelebrateFive();
        maybeOfferExpansion();
      }

      function rewardWrong() {
        state.streak = 0;
      }

      function checkAnswer() {
        if (state.checked) return;
        if (!state.task) return;
        if (state.task.family === "choice") return;

        if (state.answer === "" || state.answer === "-") {
          setMessage("Először írj be egy számot.", "messageInfo");
          return;
        }

        state.checked = true;

        var ok = normalizeAnswer(state.answer) === state.task.answer;

        if (ok) {
          rewardCorrect();
          setMessage("Ügyes!", "messageGood");
        } else {
          rewardWrong();
          setMessage("Most nem jó. Helyes: " + state.task.answer.replace("-", "−"), "messageBad");
        }

        renderTask();
        updateStats();
      }

      function setRange(min, max) {
        minInput.value = String(min);
        maxInput.value = String(max);
        clampRange();
        newTask();
      }

      function generatePracticeSheet() {
        var oldTask = state.task;
        var oldAnswer = state.answer;
        var oldChecked = state.checked;
        var oldSelectedChoice = state.selectedChoice;
        var arr = [];
        var i;
        var t;

        for (i = 1; i <= 10; i++) {
          t = generateTask();
          if (t.family === "addsub") {
            arr.push(i + ".   " + t.a + " " + (t.op === "-" ? "−" : "+") + " " + t.b + " = ____");
          } else if (t.family === "missing") {
            arr.push(i + ".   " + (t.leftBlank ? "____" : t.a) + " " + (t.op === "-" ? "−" : "+") + " " + (t.leftBlank ? t.b : "____") + " = " + t.result);
          } else if (t.family === "relation") {
            arr.push(i + ".   " + (t.blankLeft ? "____" : t.known) + " " + t.sign + " " + (t.blankLeft ? t.known : "____") + "   (különbség: " + t.diff + ")");
          } else if (t.family === "choice") {
            arr.push(i + ".   " + t.a + " " + (t.op === "-" ? "−" : "+") + " " + t.b + " =     lehetőségek: " + t.options.join(", "));
          } else if (t.family === "triple") {
            arr.push(i + ".   " + t.a + " " + (t.op1 === "-" ? "−" : "+") + " " + t.b + " " + (t.op2 === "-" ? "−" : "+") + " " + t.c + " = ____");
          }
        }

        sheetOutput.textContent = arr.join("\n");
        sheetCard.style.display = "block";

        state.task = oldTask;
        state.answer = oldAnswer;
        state.checked = oldChecked;
        state.selectedChoice = oldSelectedChoice;
        renderTask();
      }

      window.selectChoice = function(value) {
        if (!state.task || state.task.family !== "choice" || state.checked) return;

        state.selectedChoice = value;
        state.checked = true;

        if (String(value) === state.task.answer) {
          rewardCorrect();
          setMessage("Ügyes!", "messageGood");
        } else {
          rewardWrong();
          setMessage("Most nem jó. Helyes: " + state.task.answer.replace("-", "−"), "messageBad");
        }

        renderTask();
        updateStats();
      };

      document.getElementById("applyRangeBtn").onclick = function() {
        clampRange();
        newTask();
      };

      document.getElementById("checkBtn").onclick = checkAnswer;
      document.getElementById("nextBtn").onclick = newTask;
      document.getElementById("minusBtn").onclick = function() { addChar("-"); };
      document.getElementById("backBtn").onclick = backspace;
      document.getElementById("clearBtn").onclick = clearAnswer;
      document.getElementById("sheetBtn").onclick = generatePracticeSheet;

      document.getElementById("expandYesBtn").onclick = function() {
        var nextMin = parseInt(rewardBox.getAttribute("data-next-min"), 10);
        var nextMax = parseInt(rewardBox.getAttribute("data-next-max"), 10);
        setRange(nextMin, nextMax);
        setMessage("Új számkör beállítva.", "messageInfo");
        hideReward();
      };

      document.getElementById("expandNoBtn").onclick = function() {
        hideReward();
        setMessage("Marad a mostani számkör.", "messageInfo");
      };

      var presetBtns = document.getElementsByClassName("presetBtn");
      var i;
      for (i = 0; i < presetBtns.length; i++) {
        presetBtns[i].onclick = function() {
          setRange(
            parseInt(this.getAttribute("data-min"), 10),
            parseInt(this.getAttribute("data-max"), 10)
          );
        };
      }

      var taskTypeBtns = document.getElementsByClassName("taskType");
      for (i = 0; i < taskTypeBtns.length; i++) {
        taskTypeBtns[i].onclick = function() {
          var type = this.getAttribute("data-type");
          state.enabledTypes[type] = !state.enabledTypes[type];
          if (state.enabledTypes[type]) this.classList.add("active");
          else this.classList.remove("active");
          newTask();
        };
      }

      var digitBtns = document.getElementsByClassName("digitBtn");
      for (i = 0; i < digitBtns.length; i++) {
        digitBtns[i].onclick = function() {
          addChar(this.getAttribute("data-key"));
        };
      }

      var canvas = document.getElementById("fireworksCanvas");
      var ctx = canvas.getContext("2d");
      var fireworks = [];
      var fireworkRunning = false;
      var fireworkEndTime = 0;

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      function createBurst(x, y) {
        var parts = [];
        for (var i = 0; i < 30; i++) {
          parts.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            life: 60 + Math.random() * 20,
            size: 2 + Math.random() * 3
          });
        }
        fireworks.push(parts);
      }

      function startFireworks() {
        resizeCanvas();
        fireworkRunning = true;
        fireworkEndTime = Date.now() + 1800;

        createBurst(canvas.width * 0.3, canvas.height * 0.35);
        createBurst(canvas.width * 0.7, canvas.height * 0.3);
        createBurst(canvas.width * 0.5, canvas.height * 0.5);

        requestAnimationFrame(animateFireworks);
      }

      function animateFireworks() {
        if (!fireworkRunning) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (var i = fireworks.length - 1; i >= 0; i--) {
          var burst = fireworks[i];
          for (var j = burst.length - 1; j >= 0; j--) {
            var p = burst[j];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.06;
            p.life -= 1;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(" +
              (150 + Math.floor(Math.random() * 105)) + "," +
              (100 + Math.floor(Math.random() * 155)) + "," +
              (150 + Math.floor(Math.random() * 105)) + "," +
              Math.max(0, p.life / 80) + ")";
            ctx.fill();

            if (p.life <= 0) {
              burst.splice(j, 1);
            }
          }
          if (burst.length === 0) {
            fireworks.splice(i, 1);
          }
        }

        if (Date.now() < fireworkEndTime || fireworks.length > 0) {
          requestAnimationFrame(animateFireworks);
        } else {
          fireworkRunning = false;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }

      clampRange();
      updateStats();
      newTask();
    } catch (e) {
      showDebug("INIT HIBA:\n" + e.message);
    }
  </script>
</body>
</html>
