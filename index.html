<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Matek gyakorló</title>
  <style>
    :root{
      --bg1:#f7f4ff;
      --bg2:#eef6ff;
      --card:#ffffff;
      --ink:#1f2430;
      --muted:#667085;
      --primary:#6f5cff;
      --yellow:#ffd84d;
      --green:#18b368;
      --red:#e34d4d;
      --blue:#3f7cff;
      --line:#d9def0;
      --shadow:0 12px 32px rgba(38,34,90,.14);
      --radius:22px;
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--ink);
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      min-height:100vh;
      padding:14px;
      -webkit-tap-highlight-color: transparent;
    }

    .app{
      max-width:760px;
      margin:0 auto;
      display:grid;
      gap:14px;
      padding-bottom:18px;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
    }

    h1{
      margin:0 0 8px;
      text-align:center;
      font-size:30px;
    }

    .sub{
      text-align:center;
      color:var(--muted);
      font-size:16px;
    }

    .debug{
      display:none;
      background:#fff1f1;
      color:#a32020;
      border:2px solid #f0b7b7;
      border-radius:16px;
      padding:12px;
      font-weight:700;
      white-space:pre-wrap;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin-top:14px;
    }

    .stat{
      background:#f7f8ff;
      border-radius:18px;
      padding:12px 10px;
      text-align:center;
    }

    .statValue{
      font-size:26px;
      font-weight:800;
      line-height:1;
      margin-bottom:4px;
    }

    .statLabel{
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }

    .settings{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .field label{
      display:block;
      font-size:14px;
      color:var(--muted);
      font-weight:700;
      margin-bottom:6px;
    }

    .numInput{
      width:100%;
      min-height:54px;
      border:2px solid var(--line);
      border-radius:16px;
      padding:10px 12px;
      font-size:22px;
      font-weight:800;
      text-align:center;
      background:#fcfcff;
      color:var(--ink);
    }

    .pills{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }

    .pill{
      border:none;
      border-radius:999px;
      padding:12px 14px;
      font-size:15px;
      font-weight:800;
      background:#eef2ff;
      color:#33425e;
      cursor:pointer;
    }

    .pill.active{
      background:var(--primary);
      color:white;
    }

    .rowBetween{
      display:flex;
      gap:10px;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .taskWrap{
      text-align:center;
    }

    .typeTag{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      background:#eef2ff;
      color:#40506f;
      font-size:14px;
      font-weight:800;
      margin-bottom:12px;
    }

    .task{
      min-height:130px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:8px 0;
    }

    .expr{
      display:flex;
      align-items:center;
      justify-content:center;
      flex-wrap:wrap;
      gap:10px;
      font-size:clamp(34px,8vw,62px);
      font-weight:900;
      line-height:1.15;
    }

    .blank{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:110px;
      min-height:74px;
      border-radius:18px;
      padding:0 14px;
      border:4px dashed #bcc7e8;
      background:#fbfcff;
      color:#243147;
    }

    .blank.filled{
      border-style:solid;
      border-color:#cad4f0;
    }

    .blank.good{
      border-color:var(--green);
      background:#edfff5;
      color:#0f8b50;
    }

    .blank.bad{
      border-color:var(--red);
      background:#fff0f0;
      color:#c63939;
    }

    .relationBox{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
    }

    .diffBadge{
      min-width:66px;
      min-height:40px;
      padding:0 14px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#eef6ff;
      color:#275b98;
      font-size:22px;
      font-weight:900;
      box-shadow:inset 0 0 0 2px #cfe3ff;
    }

    .message{
      min-height:36px;
      text-align:center;
      font-size:26px;
      font-weight:900;
      margin-top:6px;
    }

    .message.good{ color:var(--green); }
    .message.bad{ color:var(--red); }
    .message.info{ color:var(--blue); }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:8px;
    }

    .bigBtn{
      min-height:62px;
      border:none;
      border-radius:18px;
      font-size:24px;
      font-weight:900;
      cursor:pointer;
    }

    .primaryBtn{
      background:var(--primary);
      color:white;
    }

    .yellowBtn{
      background:var(--yellow);
      color:#2f2a14;
    }

    .numpad{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:12px;
    }

    .key{
      min-height:74px;
      border:none;
      border-radius:18px;
      font-size:30px;
      font-weight:900;
      background:#f5f7ff;
      color:#2b3751;
      box-shadow:inset 0 0 0 2px #dde4ff;
      cursor:pointer;
    }

    .key.action{
      background:#eaf6ff;
      color:#245f9d;
      box-shadow:inset 0 0 0 2px #cde5ff;
      font-size:22px;
    }

    .key.neg{
      background:#fff7ea;
      color:#7b5d17;
      box-shadow:inset 0 0 0 2px #ffe0a6;
    }

    .key.wide{
      grid-column:span 2;
    }

    .hint{
      margin-top:8px;
      text-align:center;
      font-size:14px;
      color:var(--muted);
    }

    .reward{
      display:none;
      text-align:center;
      background:linear-gradient(180deg,#fffbe8,#fff4c9);
      border-radius:22px;
      padding:16px;
      box-shadow:inset 0 0 0 2px #ffe28c;
    }

    .reward.show{
      display:block;
    }

    .rewardTitle{
      font-size:24px;
      font-weight:900;
      margin-bottom:6px;
    }

    .rewardText{
      font-size:17px;
      color:#5c4a14;
      margin-bottom:12px;
      line-height:1.4;
    }

    .rewardActions{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:10px;
    }

    .rewardActions button{
      min-height:52px;
      padding:0 18px;
      border:none;
      border-radius:16px;
      font-size:18px;
      font-weight:900;
      cursor:pointer;
    }

    .yesBtn{
      background:var(--green);
      color:white;
    }

    .noBtn{
      background:#eef1f7;
      color:#374151;
    }

    .sheetCard{
      display:none;
    }

    .sheetTitle{
      text-align:center;
      font-size:24px;
      font-weight:900;
      margin-bottom:10px;
    }

    .sheetOutput{
      white-space:pre-line;
      font-size:22px;
      line-height:1.8;
    }

    @media (max-width:640px){
      .stats{
        grid-template-columns:repeat(2,1fr);
      }

      .settings{
        grid-template-columns:1fr;
      }

      .blank{
        min-width:96px;
        min-height:68px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="debugBox" class="debug"></div>

    <div class="card">
      <h1>Matek gyakorló 2.2</h1>
      <div class="sub">Több feladattípus, saját számbillentyűzet, jutalmazás</div>

      <div class="stats">
        <div class="stat">
          <div class="statValue" id="scoreValue">0</div>
          <div class="statLabel">Pont</div>
        </div>
        <div class="stat">
          <div class="statValue" id="streakValue">0</div>
          <div class="statLabel">Sorozat</div>
        </div>
        <div class="stat">
          <div class="statValue" id="starsValue">0</div>
          <div class="statLabel">Csillag</div>
        </div>
        <div class="stat">
          <div class="statValue" id="rangeValue">0–9</div>
          <div class="statLabel">Számkör</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="settings">
        <div class="field">
          <label for="minInput">Legkisebb szám</label>
          <input id="minInput" class="numInput" type="number" value="0" />
        </div>
        <div class="field">
          <label for="maxInput">Legnagyobb szám</label>
          <input id="maxInput" class="numInput" type="number" value="9" />
        </div>
      </div>

      <div class="pills">
        <button class="pill rangePreset" data-min="0" data-max="9" type="button">0–9</button>
        <button class="pill rangePreset" data-min="0" data-max="20" type="button">0–20</button>
        <button class="pill rangePreset" data-min="-10" data-max="10" type="button">-10–10</button>
        <button class="pill rangePreset" data-min="10" data-max="50" type="button">10–50</button>
      </div>

      <div class="rowBetween">
        <div class="pills" style="margin-top:0;">
          <button class="pill taskType active" data-type="addsub" type="button">+ / -</button>
          <button class="pill taskType active" data-type="missing" type="button">Hiányzó tag</button>
          <button class="pill taskType active" data-type="relation" type="button">Reláció</button>
        </div>

        <button id="applyRangeBtn" class="pill" type="button">Számkör frissítése</button>
      </div>
    </div>

    <div class="card">
      <div class="taskWrap">
        <div class="typeTag" id="typeTag">Feladat</div>
        <div class="task" id="taskArea"></div>
        <div class="message" id="message"></div>

        <div class="actions">
          <button id="checkBtn" class="bigBtn primaryBtn" type="button">Ellenőrzés</button>
          <button id="nextBtn" class="bigBtn yellowBtn" type="button">Következő</button>
        </div>

        <div class="numpad">
          <button class="key digitKey" data-key="1" type="button">1</button>
          <button class="key digitKey" data-key="2" type="button">2</button>
          <button class="key digitKey" data-key="3" type="button">3</button>
          <button class="key digitKey" data-key="4" type="button">4</button>
          <button class="key digitKey" data-key="5" type="button">5</button>
          <button class="key digitKey" data-key="6" type="button">6</button>
          <button class="key digitKey" data-key="7" type="button">7</button>
          <button class="key digitKey" data-key="8" type="button">8</button>
          <button class="key digitKey" data-key="9" type="button">9</button>
          <button id="minusBtn" class="key neg" type="button">−</button>
          <button class="key digitKey" data-key="0" type="button">0</button>
          <button id="backBtn" class="key action" type="button">⌫</button>
          <button id="clearBtn" class="key action wide" type="button">Törlés</button>
          <button id="sheetBtn" class="key action" type="button">10 sor</button>
        </div>

        <div class="hint">A számot az alsó gombokkal írd be.</div>
      </div>
    </div>

    <div id="rewardBox" class="card reward">
      <div class="rewardTitle">Ügyesen megy.</div>
      <div id="rewardText" class="rewardText">Bővítsem a számkört?</div>
      <div class="rewardActions">
        <button id="expandYesBtn" class="yesBtn" type="button">Igen</button>
        <button id="expandNoBtn" class="noBtn" type="button">Még ne</button>
      </div>
    </div>

    <div id="sheetCard" class="card sheetCard">
      <div class="sheetTitle">Gyakorló feladatsor</div>
      <div id="sheetOutput" class="sheetOutput"></div>
    </div>
  </div>

  <script>
    window.onerror = function(msg, src, line, col, err){
      var box = document.getElementById("debugBox");
      if (box) {
        box.style.display = "block";
        box.textContent = "JS hiba: " + msg + "\nSor: " + line + "\nOszlop: " + col;
      }
    };

    (function () {
      var state = {
        min: 0,
        max: 9,
        score: 0,
        streak: 0,
        stars: 0,
        answer: "",
        checked: false,
        task: null,
        enabledTypes: {
          addsub: true,
          missing: true,
          relation: true
        },
        lastExpandScore: -1
      };

      var els = {
        scoreValue: document.getElementById("scoreValue"),
        streakValue: document.getElementById("streakValue"),
        starsValue: document.getElementById("starsValue"),
        rangeValue: document.getElementById("rangeValue"),
        minInput: document.getElementById("minInput"),
        maxInput: document.getElementById("maxInput"),
        typeTag: document.getElementById("typeTag"),
        taskArea: document.getElementById("taskArea"),
        message: document.getElementById("message"),
        rewardBox: document.getElementById("rewardBox"),
        rewardText: document.getElementById("rewardText"),
        sheetCard: document.getElementById("sheetCard"),
        sheetOutput: document.getElementById("sheetOutput"),
        applyRangeBtn: document.getElementById("applyRangeBtn"),
        checkBtn: document.getElementById("checkBtn
